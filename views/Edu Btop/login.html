<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edu BTOP - Login</title>
    <link rel="stylesheet" href="https://unpkg.com/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://unpkg.com/bs-brain@2.0.4/components/logins/login-9/assets/css/login-9.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<style>
    .login-bg {
        background: linear-gradient(rgba(13, 110, 253, 0.85), rgba(13, 110, 253, 0.85)),
            url('/images/btop_llp_logo.jpg') no-repeat center center / cover;

        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }
</style>

<body>
    <section class="bg-primary min-vh-100 d-flex align-items-center py-3 py-md-5 py-xl-8">
        <div class="container">
            <div class="row gy-4 align-items-center">
                <div class="col-12 col-md-6 col-xl-7">
                    <div class="d-flex justify-content-center text-bg-primary">
                        <div class="col-12 col-xl-9">
                            <h1 class="fw-bold text-white mb-4 display-4">Edu BTOP</h1>
                            <hr class="border-primary-subtle mb-4">
                            <h2 class="h1 mb-4">Selamat Datang ke Edu BTOP</h2>
                            <p class="lead mb-5">Sistem Pembelajaran bagi Subjek Matematik, Bahasa Inggeris,
                                Bahasa Melayu & Sejarah.</p>
                            <div class="text-start opacity-75">
                                <i class="bi bi-book-half display-4 me-3"></i>
                                <i class="bi bi-journal-code display-4 me-3"></i>
                                <i class="bi bi-mortarboard display-4"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-md-6 col-xl-5">
                    <div class="card border-0 rounded-4 shadow-lg">
                        <div class="card-body p-4 p-md-5">
                            <h3 class="fw-bold mb-4 text-center text-primary">Log Masuk</h3>

                            <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>

                            <form id="loginForm">
                                <div class="row gy-3">
                                    <div class="col-12">
                                        <div class="form-floating mb-1">
                                            <input type="email" class="form-control" name="email" id="email"
                                                placeholder="name@example.com" required>
                                            <label for="email" class="form-label">Alamat E-mel</label>
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <div class="form-floating mb-1">
                                            <input type="password" class="form-control" name="password" id="password"
                                                placeholder="Kata Laluan" required>
                                            <label for="password" class="form-label">Kata Laluan</label>
                                        </div>
                                    </div>
                                    <div class="col-6">
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" value="admin" name="role"
                                                id="roleAdmin">
                                            <label class="form-check-label text-secondary fw-semibold" for="roleAdmin">
                                                Admin BTOP
                                            </label>
                                        </div>
                                    </div>
                                    <div class="col-6">
                                        <div class="form-check">
                                            <input class="form-check-input" type="radio" value="student" name="role"
                                                id="roleStudent" checked>
                                            <label class="form-check-label text-secondary fw-semibold"
                                                for="roleStudent">
                                                Pelajar
                                            </label>
                                        </div>
                                    </div>
                                    <div class="col-12 mt-4">
                                        <div class="d-grid">
                                            <button class="btn btn-primary btn-lg shadow-sm" type="submit"
                                                id="btnSubmit">
                                                <i class="bi bi-box-arrow-in-right me-2"></i> Log Masuk
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const alertBox = document.getElementById('alertBox');
            const btnSubmit = document.getElementById('btnSubmit');

            alertBox.classList.add('d-none');
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Memproses...';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.querySelector('input[name="role"]:checked').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, role })
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = data.redirectUrl;
                } else {
                    alertBox.textContent = data.message || 'Ralat log masuk.';
                    alertBox.classList.remove('d-none');
                }
            } catch (err) {
                alertBox.textContent = 'Ralat sambungan pelayan. Sila cuba lagi.';
                alertBox.classList.remove('d-none');
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i> Log Masuk';
            }
        });
    </script>
</body>

</html>
